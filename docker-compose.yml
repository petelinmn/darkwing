# Base compose file used by Visual Studio (docker-compose.dcproj) and CLI.
services:
  darkwing.api:
    image: ${DOCKER_REGISTRY-}darkwingapi
    build:
      context: .
      dockerfile: src/Darkwing.Api/Dockerfile
    networks:
      - darkwing-network

  darkwing.worker:
    image: ${DOCKER_REGISTRY-}darkwingworker
    build:
      context: .
      dockerfile: src/Darkwing.Worker/Dockerfile
    networks:
      - darkwing-network

  price.picker:
    image: ${DOCKER_REGISTRY-}pricepicker
    build:
      context: .
      dockerfile: src/PricePicker/Dockerfile
    depends_on:
      - kafka
    networks:
      - darkwing-network

  price.analyzer:
    image: ${DOCKER_REGISTRY-}priceanalyzer
    build:
      context: .
      dockerfile: src/PriceAnalyzer/Dockerfile
    depends_on:
      - kafka
    networks:
      - darkwing-network

  kafka:
    image: apache/kafka:latest
    container_name: kafka
    ports:
      - "9093:9093"
      - "9095:9095"
    volumes:
      - ../kafka-data:/opt/kafka/data
      - ./config/kafka_server_jaas.conf:/var/lib/kafka/config/kafka_server_jaas.conf:ro
    networks:
      - darkwing-network
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9093,EXTERNAL://0.0.0.0:9095,CONTROLLER://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9093,EXTERNAL://localhost:9095
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:SASL_PLAINTEXT,EXTERNAL:SASL_PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_LOG_RETENTION_MS: 7776000000
      KAFKA_SASL_ENABLED_MECHANISMS: PLAIN
      KAFKA_SASL_MECHANISM_INTER_BROKER_PROTOCOL: PLAIN
      KAFKA_OPTS: "-Djava.security.auth.login.config=/var/lib/kafka/config/kafka_server_jaas.conf"
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9094
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_CLUSTER_ID: "5L6g3nShT-eMCtK--X86sw"

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      - kafka
    ports:
      - "8081:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka:9093"
      KAFKA_CLUSTERS_0_PROPERTIES_SECURITY_PROTOCOL: SASL_PLAINTEXT
      KAFKA_CLUSTERS_0_PROPERTIES_SASL_MECHANISM: PLAIN
      KAFKA_CLUSTERS_0_PROPERTIES_SASL_JAAS_CONFIG: 'org.apache.kafka.common.security.plain.PlainLoginModule required username="testuser" password="testpass";'
    networks:
      - darkwing-network

networks:
  darkwing-network:
    driver: bridge
