apiVersion: apps/v1
kind: Deployment
metadata:
  name: darkwing-api
  namespace: darkwing
  labels:
    app.kubernetes.io/name: darkwing-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: darkwing
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: darkwing-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: darkwing-api
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: darkwing
    spec:
      containers:
        - name: api
          image: darkwing-api:local
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
            - name: ASPNETCORE_URLS
              value: http://+:8080
          readinessProbe:
            httpGet:
              path: /weatherforecast
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /weatherforecast
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
