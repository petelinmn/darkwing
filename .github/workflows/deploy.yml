name: Deploy to VDS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-vds
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VDS_HOST }}
          username: ${{ secrets.VDS_USER }}
          key: ${{ secrets.VDS_SSH_KEY }}
          port: ${{ secrets.VDS_PORT }}
          script_stop: true
          # Long enough for docker builds on a small VDS
          command_timeout: 30m
          script: |
            set -euo pipefail
            APP_DIR='${{ secrets.VDS_APP_DIR }}'
            if [ -z "$APP_DIR" ]; then
              APP_DIR="/opt/darkwing"
            fi
            cd "$APP_DIR"
            git fetch origin main
            git checkout main
            git reset --hard origin/main
            chmod +x scripts/deploy-vds.sh
            IMAGE_TAG='${{ github.sha }}' ./scripts/deploy-vds.sh
